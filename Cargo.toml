[package]
name = "toolkit-zero"
version = "1.0.0"
edition = "2024"
description = "A feature-selective Rust utility toolkit — a growing collection of categorized utilities you can opt into via Cargo features, including only what you need."
license = "MIT"

[dependencies]
log = { version = "0.4.29", optional = true }
reqwest = { version = "0.13.2", optional = true, features = ["blocking", "json", "query"] }
serde = { version = "1.0.228", optional = true }
tokio = { version = "1.50.0", features = ["rt"], optional = true }
warp = { version = "0.4.2", optional = true }

[features]
default = []
socket = ["socket-server", "socket-client"]
socket-server = [
    "dep:reqwest",
    "dep:serde",
    "dep:warp",
    "warp/server",
    "dep:log",
    "dep:tokio",
    "tokio/rt",
]
socket-client = [
    "dep:reqwest",
    "reqwest/blocking",
    "reqwest/json",
    "reqwest/query",
    "dep:serde",
    "serde/derive",
    "dep:log",
]
